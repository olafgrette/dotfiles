theme = "onedarker"

[editor]
auto-save = true
cursorline = true
gutters = ["diagnostics", "line-numbers"]
line-number = "relative"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = true

[editor.soft-wrap]
enable = true

[keys.normal]
C-j = "half_page_down"
C-k = "half_page_up"

