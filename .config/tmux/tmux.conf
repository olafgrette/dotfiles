# Truecolor support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm*:RGB"
set -ga terminal-overrides ",xterm*:Tc"

# Enable extended keys for Shift+Enter etc. (requires tmux 3.3+)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Mouse support (scroll wheel, click to select panes)
set -g mouse on

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Cursor: blinking line
set -g cursor-style blinking-bar

# vi-style copy mode
set-window-option -g mode-keys vi
set-hook -g after-copy-mode 'set -p cursor-style underline'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send-keys -X copy-line
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi C-u send-keys -X halfpage-up
bind-key -T copy-mode-vi C-d send-keys -X halfpage-down

# Status bar colors
set -g status-style "fg=white,bg=colour25"

# Left: session name
set -g status-left "#[fg=white,bg=colour17,bold] #S #[default] "
set -g status-left-length 30

# Right: time and date
set -g status-right "#[fg=white] %H:%M  %d %b "

# Window list
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "fg=white,bg=colour33,bold"

# Machine-local overrides (gitignored)
source-file -q ~/.config/tmux/tmux.local.conf
